{% extends "layout.html" %}

{% block title %}
Tweet List
{% endblock %}

{% block content %}

<div class="container mt-4">

<h1 class="text-center mb-4">Tweet Feed</h1>

<a class="btn btn-primary mb-4" href="{% url 'tweet_create' %}">
Create Tweet
</a>

<div class="row g-4">

{% for tweet in tweets %}

<div class="col-md-4 col-sm-6">
    <div class="card shadow-sm h-100">

        <img src="{{ tweet.photo.url }}" 
             class="card-img-top img-fluid"
             style="height:220px; object-fit:cover;">

        <div class="card-body">

            <h5 class="card-title">
                {{ tweet.user.username }}
            </h5>

            <p class="card-text">
                {{ tweet.text }}
            </p>

            <a href="{% url 'tweet_edit' tweet.id %}" 
               class="btn btn-sm btn-warning">
               Edit
            </a>

            <a href="{% url 'tweet_delete' tweet.id %}" 
               class="btn btn-sm btn-danger">
               Delete
            </a>

        </div>

    </div>
</div>

{% endfor %}

</div>

</div>

{% endblock %}
